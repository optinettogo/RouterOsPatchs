    <script>
        (function(){
            var linkEl = document.getElementById('webfont-css');
            if (!linkEl) return;
            var mirrorHref = 'https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&family=Fira+Code&display=swap';
            // Check if a specific font is loaded
            function isLoaded(name){
                if (!('fonts' in document)) return false;
                try { return document.fonts.check('1em "' + name + '"'); } catch (e) { return false; }
            }
            // Switch to mirror font server if Google Fonts fails
            function switchToMirror(){
                if (linkEl.href !== mirrorHref) { linkEl.href = mirrorHref; }
            }
            if (!('fonts' in document)) { switchToMirror(); return; }
            var decided = false;
            // Timeout fallback - switch to mirror after 2.5 seconds if fonts not loaded
            var timer = setTimeout(function(){
                if (!decided && (!isLoaded('Inter') || !isLoaded('Fira Code'))) {
                    decided = true; switchToMirror();
                }
            }, 2500);
            // Check when fonts are ready
            document.fonts.ready.then(function(){
                if (!decided && (!isLoaded('Inter') || !isLoaded('Fira Code'))) {
                    decided = true; switchToMirror();
                } else {
                    decided = true; clearTimeout(timer);
                }
            });
        })();
    </script>

                if (typeof renderDownloads === 'function') renderDownloads();

            // Initialize language based on saved preference, default to English
            function initLanguage() {
                let savedLang = localStorage.getItem("lang") || "en";
                document.getElementById("lang-switcher").value = savedLang;
                setLanguage(savedLang);

            // Language switcher event listener

            const htmlEl = document.documentElement;
            const sunIcon = themeBtn.querySelector('.sun-icon');
            const moonIcon = themeBtn.querySelector('.moon-icon');

                if (htmlEl.classList.contains('dark')) {
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                } else {
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                }
            }
            
            // Initialize theme based on saved preference or system preference
            function initializeTheme() {
                const savedTheme = localStorage.getItem("theme");
                if (savedTheme) {
                    htmlEl.classList.toggle("dark", savedTheme === "dark");
                } else {
                    // Use system preference if no saved theme
                    htmlEl.classList.toggle("dark", window.matchMedia('(prefers-color-scheme: dark)').matches);

            // Fetch latest version numbers from MikroTik servers

                    groups: [
                        { title:"X86", arch:"x86", downloads:[ { title:"RouterOs npk", type:"main" }, { title:"All packages", type:"extra" }, { title:"ISO Image", type:"iso" }, { title:"Install image", type:"install" } ] },
                        { title:"GENERAL", arch:"general", downloads:[ { title:"Netinstall (Windows)", type:"netinstall_windows" } ] }

                        { title:"CHR", arch:"x86", downloads:[ { title:"Cloud Hosted Router", type:"chr_zip" } ] },

                {
                    title: "Virtual & GNS3 & LABS",
                    versions:[ { title:"Stable", version:routeros7_stable } ],

                        {
                            title: "vmDiskImages",

                                { title:"QCOW2 (KVM/GNS3)", type:"chr_qcow2" },

                                { title:"VMDK Image", type:"inst_vmdk" },
                                { title:"VPC Image", type:"inst_vpc" }
                            ]
                        }
                    ]
                }
            ];

            // Function to generate file names based on version, architecture, and type
            const fileNames = (version, arch, type) => {
                const files = [];
                const v = version.replace(/^v/, ''); // Standardize version string
                
                // RouterOS v6 only supports x86 architecture
                if (v.charAt(0) === "6" && arch !== "x86") return files;

                // Main package and ISO
                if (type === "main" && v.charAt(0) === "7") files.push(`routeros-${v}${arch === "x86" ? "" : "-" + arch}.npk`);
                if (type === "iso") files.push(`mikrotik-${v}${arch === "x86" ? "" : "-" + arch}.iso`);
                if (type === "extra") files.push(`all_packages-${arch}-${v}.zip`);
                if (type === "install") files.push(`install-image-${v}.img.zip`);

                // Cloud Hosted Router (single zip)
                if (type === "chr_zip") files.push(`chr-${v}.img.zip`);

                // CHR Disk Images (all formats)
                if (type === "chr_qcow2") files.push(`chr-${v}.qcow2.zip`);
                if (type === "chr_vdi")   files.push(`chr-${v}.vdi.zip`);
                if (type === "chr_vhdx")  files.push(`chr-${v}.vhdx.zip`);
                if (type === "chr_vmdk")  files.push(`chr-${v}.vmdk.zip`);
                if (type === "chr_vpc")   files.push(`chr-${v}.vpc.zip`);

                // Install Disk Images (all formats)
                if (type === "inst_img")   files.push(`install-image-${v}.img.zip`);
                if (type === "inst_qcow2") files.push(`install-image-${v}.qcow2.zip`);
                if (type === "inst_vdi")   files.push(`install-image-${v}.vdi.zip`);

                if (type === "inst_vpc")   files.push(`install-image-${v}.vpc.zip`);

                // Backward compatibility for legacy types
                if (type === "img" && arch === "x86") files.push(`chr-${v}.img.zip`);
                if (type === "netinstall_windows") files.push(`netinstall-${v}.zip`);

                return files;

                            <thead class="text-xs text-slate-700 dark:text-slate-200 uppercase bg-slate-50/80 dark:bg-gray-700/80">
                                <tr>
                                    <th scope="col" class="px-6 py-3 rounded-l-lg">${i18n[lang].packageArch || "Package / Architecture"}</th>
                                    ${download.versions.map(v => `<th scope="col" class="px-6 py-3 text-center">${v.version}<br><span class="font-normal normal-case">${v.title}</span></th>`).join("")}
                                    <th class="rounded-r-lg"></th>
                                </tr>
                            </thead>
                            <tbody>
                                ${download.groups.map(g => `
                                    <tr class="bg-slate-100/80 dark:bg-gray-700/50">
                                        <th colspan="${download.versions.length + 2}" class="px-6 py-2 text-base font-semibold text-slate-800 dark:text-white">${i18n[lang][g.title] || g.title}</th>
                                    </tr>
                                    ${g.downloads.map(d => `
                                        <tr class="bg-transparent border-b last:border-b-0 border-slate-200 dark:border-gray-700 hover:bg-slate-50/50 dark:hover:bg-gray-800/50 transition-colors">
                                            <td class="px-6 py-4 font-medium text-slate-900 dark:text-white whitespace-nowrap">${d.title}</td>
                                            ${download.versions.map(v => {
                                                const files = fileNames(v.version, g.arch, d.type);
                                                if (!files || files.length === 0) return `<td class="px-6 py-4"></td>`;
                                                const links = files.map(file => {
                                                    const url = `${baseUrl(v.version, g.arch)}${file}`;
                                                    return `<a href="${url}" class="inline-flex items-center gap-1.5 text-blue-500 dark:text-blue-400 hover:underline" title="${file}" target="_blank"><span class="iconify" data-icon="${ICONS.download}"></span> Download</a>`;
                                                }).join("");
                                                return `<td class="px-6 py-4 text-center space-x-2">${links}</td>`;
                                            }).join("")}
                                            <td></td>
                                        </tr>
                                    `).join("")}
                                `).join("")}
                            </tbody>
                        </table>
                    `;
                    
                    content.appendChild(table);
                    accordion.appendChild(summary);
                    accordion.appendChild(content);
                    container.appendChild(accordion);
                });
            }

            // Initial render
            renderDownloads();

            // Command generation and version selection
            const versionBtnsContainer = document.getElementById("version-buttons");
            const commandDiv = document.getElementById("command");
            const copyBtn = document.getElementById("copy-btn");

            versionBtnsContainer.innerHTML = `
                <button data-version="${routeros7_stable}" class="px-3 py-1.5 text-sm font-medium rounded-md hover:bg-blue-200 dark:hover:bg-gray-600 transition-all">v7 Stable</button>
            `;
            
            function updateCommand(version) {
                const tool = document.querySelector('input[name="tool"]:checked').value;
                const _version = version===undefined?"": `<span class="text-green-500 font-semibold">VERSION</span>=<span class="text-yellow-400">${version}</span> `
                const cmd = tool === "curl" 
                    ? `<pre class="text-slate-300"><code>${_version}<span class="text-blue-400 font-bold">bash</span> <span class="text-pink-400">&lt;(</span><span class="text-blue-400 font-bold">curl</span> <span class="text-teal-400">https://patch.optinettogo.com/chr.sh</span><span class="text-pink-400">)</span></code></pre>`
                    : `<pre class="text-slate-300"><code>${_version}<span class="text-blue-400 font-bold">bash</span> <span class="text-pink-400">&lt;(</span><span class="text-blue-400 font-bold">wget -O - </span><span class="text-teal-400">https://patch.optinettogo.com/chr.sh</span><span class="text-pink-400">)</span></code></pre>`;
                commandDiv.innerHTML = cmd;
            }

            document.querySelectorAll('input[name="tool"]').forEach(radio => {
                radio.addEventListener("change", () => {
                    const activeBtn = document.querySelector("#version-buttons button.active");
                    activeBtn ? updateCommand(activeBtn.dataset.version) : updateCommand();
                });
            });

            const buttons = document.querySelectorAll("#version-buttons button");
            buttons.forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.preventDefault();
                    if (btn.classList.contains("active")) {
                        updateCommand();
                        btn.classList.remove("active");
                    }else{
                        updateCommand(btn.dataset.version);
                        buttons.forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                    }
                });
            });
            updateCommand();
            
            copyBtn.addEventListener("click", () => {
                const code = commandDiv.querySelector("code").innerText;
                navigator.clipboard.writeText(code).then(() => {
                    copyBtn.querySelector('.copy-icon').classList.add('hidden');
                    copyBtn.querySelector('.check-icon').classList.remove('hidden');
                    setTimeout(() => {
                        copyBtn.querySelector('.copy-icon').classList.remove('hidden');
                        copyBtn.querySelector('.check-icon').classList.add('hidden');
                    }, 2000);
                }).catch(err => console.error("Copy failed:", err));
            });

        });
    </script>
